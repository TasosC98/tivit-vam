experiment:
  name: pianovam_hdf5_randstart

dataset:
  root: /home/mkoziri/datasets/PianoVAM_v1.0
  root_dir: /home/mkoziri/datasets/PianoVAM_v1.0
  preprocessed_format: hdf5
  hdf5_root: /home/mkoziri/datasets/PianoVAM_v1.0/HDF5
  metadata_json: /home/mkoziri/datasets/PianoVAM_v1.0/metadata_v2.json
  # Ensure training/eval use the exact split names that exist in metadata_v2.json
  split_train: train
  split_val: valid
  split_test: test
  frames: 96
  batch_size: 1
  num_workers: 2
  shuffle: true
  registration:
    enable: true
    cache_path: reg_refined_pianovam.json
  tiles: 3
  sampler:
    onset_frac: 0.3
    nearmiss_frac: 0.2
    bg_frac: 0.5

training:
  epochs: 40
  eval_freq: 1
  save_every: 1
  log_interval: 10
  amp: false
  metrics:
    prob_threshold_onset: 0.006
    prob_threshold_offset: 0.007
    decoder:
      onset:
        open: 0.36
        hold: 0.28
        min_on: 2
        min_off: 2
        merge_gap: 1
        median: 3
      offset:
        open: 0.32
        hold: 0.24
        min_on: 2
        min_off: 2
        merge_gap: 1
        median: 3
  loss:
    heads:
      onset:
        pos_weight: 2.0
      offset:
        pos_weight: 2.0

logging:
  log_dir: logs/pianovam_hdf5_randstart
  checkpoint_dir: logs/pianovam_hdf5_randstart/checkpoints
  tensorboard: false

calibration:
  method: threshold_sweep
  split: valid
  sweep:
    min_prob: 0.001
    max_prob: 0.02
    steps: 25

